<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ultimate GSAP Starter</title>
		<link rel="stylesheet" href="/src/style.css" />
		<link rel="stylesheet" href="/src/pages/animation2/style.css" />
	</head>
	<body>
		<div class="wrapper">
			<div class="flex items-center gap-4 mb-4">
				<a
					href="/"
					class="text-2xl text-gray-100 w-10 h-10 bg-gray-800 rounded-xl flex items-center justify-center transition-colors hover:text-white hover:bg-gray-700"
				>
					⬅
				</a>
				<h1>Animation 2 | Controls, methods</h1>
			</div>
			<div class="container">
				<div class="box"></div>
			</div>
			<div class="mt-2 flex flex-wrap gap-1">
				<button
					class="play px-4 py-2 rounded-lg bg-fuchsia-800 text-white hover:bg-fuchsia-700 transition-colors"
				>
					Play
				</button>
				<button
					class="pause px-4 py-2 rounded-lg bg-fuchsia-800 text-white hover:bg-fuchsia-700 transition-colors"
				>
					Pause
				</button>
				<button
					class="resume px-4 py-2 rounded-lg bg-fuchsia-800 text-white hover:bg-fuchsia-700 transition-colors"
				>
					Resume
				</button>
				<button
					class="restart px-4 py-2 rounded-lg bg-fuchsia-800 text-white hover:bg-fuchsia-700 transition-colors"
				>
					Restart
				</button>
				<button
					class="reverse px-4 py-2 rounded-lg bg-fuchsia-800 text-white hover:bg-fuchsia-700 transition-colors"
				>
					Reverse
				</button>
				<button
					class="repeat px-4 py-2 rounded-lg bg-fuchsia-800 text-white hover:bg-fuchsia-700 transition-colors"
				>
					Repeat
				</button>
				<button
					class="kill px-4 py-2 rounded-lg bg-fuchsia-800 text-white hover:bg-fuchsia-700 transition-colors"
				>
					Kill
				</button>
				<button
					class="yoyo px-4 py-2 rounded-lg bg-fuchsia-800 text-white hover:bg-fuchsia-700 transition-colors"
				>
					Yoyo
				</button>
			</div>
		</div>
		<script type="module" src="/src/pages/animation2/animation2.ts"></script>
	</body>
</html>
